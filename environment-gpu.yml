name: hsi-fm
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # PyTorch with CUDA 11.8
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=11.8

  # Core scientific (avoid NumPy 2.x complexity)
  - numpy<2.0
  - scipy
  - pandas
  
  # ML packages
  - scikit-learn
  - scikit-image
  
  # Data I/O
  - h5py
  - pyyaml
  
  # Visualization
  - matplotlib
  - seaborn
  - plotly
  
  # Utilities
  - tqdm
  - psutil
  - joblib
  - jupyterlab
  - pytest

  # Install opencv and HSI packages via pip to avoid conflicts
  - pip:
      - opencv-python==4.10.0.84
      - Pillow==10.4.0
      - spectral==0.23.1
      - albumentations==1.4.18
      - colorlog==6.9.0
      - tensorboard==2.18.0
      - onnx==1.17.0
      - onnxruntime-gpu==1.19.2
      - python-dotenv==1.0.1
