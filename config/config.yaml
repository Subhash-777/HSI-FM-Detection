# ============================================================
# HSI-FM-Detection Main Configuration
# ============================================================

project:
  name: "HSI-FM-Detection"
  version: "2.0.0"
  author: "Research Team"
  description: "Synthetic-Enhanced Lightweight Hyperspectral Detection of Foreign Materials in Food"

# ============================================================
# Paths Configuration
# ============================================================

paths:
  root: "."
  data_root: "data"
  raw_data: "data/raw"
  processed_data: "data/processed"
  synthetic_data: "data/synthetic"
  outputs: "outputs"
  experiments: "experiments"
  models: "outputs/models"
  figures: "outputs/figures"
  reports: "outputs/reports"
  logs: "logs"

# ============================================================
# Dataset Configurations
# ============================================================

datasets:
  hsifood:
    name: "HSIFoodIngr-64"
    base_path: "data/raw/HSIFoodIngr-64/extracted"
    format: "ENVI_BIL"
    n_samples: 3389
    original_resolution: [512, 512]
    n_bands: 204
    wavelength_range: [400, 1000]
    band_unit: "nm"
    processed_output: "data/processed/hsifood_204bands"

  agrifood:
    name: "HSI-AgriFoodAnomaly"
    base_path: "data/raw/HSI-AgriFoodAnomaly/extracted"
    format: "BIL"
    n_samples: 147
    original_resolution: [1000, 900]
    n_bands: 300
    wavelength_range: [400, 1000]
    splits:
      train: 89
      val: 17
      test: 41
    processed_output: "data/processed/harmonized_204bands"

# ============================================================
# Preprocessing Configuration
# ============================================================

preprocessing:
  target_bands: 204
  target_resolution: [256, 256]
  spectral_range: [400, 1000]
  normalization:
    method: "l2_per_pixel"
  interpolation: "linear"
  batch_size: 50
  save_format: "hdf5"

# ============================================================
# Foreign Material Classes
# ============================================================

fm_classes:
  - textile
  - plastic
  - paper
  - metal
  - mineral

# ============================================================
# Synthetic Data Generation
# ============================================================

synthetic:
  n_synthetic_per_clean: 10
  fm_size_range: [2, 5]
  n_objects_per_cube: [3, 7]
  alpha_range: [0.6, 0.9]
  edge_falloff: true
  gmm_aware: true
  augmentations:
    spectral_jitter: 0.05
    band_dropout_rate: 0.1
    spatial_rotation: true
    gaussian_noise: 0.02

# ============================================================
# Model Architecture
# ============================================================

model:
  input_bands: 204

  spectral_branch:
    architecture: "simple"
    channels: [64, 128, 128]

  spatial_branch:
    input_channels: 3
    channels: [32, 64, 64]

  fusion:
    hidden_dim: 64
    dropout: 0.3

# ============================================================
# Training Configuration
# ============================================================

training:
  seed: 42

  phase1:
    epochs: 50
    batch_size: 128
    learning_rate: 0.001
    weight_decay: 0.0001

  phase2:
    epochs: 75
    batch_size: 128
    learning_rate: 0.0001
    weight_decay: 0.0001

    loss:
      type: "combined"
      focal_alpha: 0.75
      focal_gamma: 2.0
      label_smoothing: 0.05
      focal_weight: 0.7
      dice_weight: 0.3

    scheduler:
      type: "cosine_warmup"
      warmup_epochs: 5
      min_lr: 0.000001

    augmentation:
      enabled: true
      apply_prob: 0.4

  early_stopping:
    patience: 20
    min_delta: 0.0002
    monitor: "val_f1"



# ============================================================
# Hardware Configuration
# ============================================================

hardware:
  device: "cuda"
  num_workers: 4
  pin_memory: true
  max_gpu_memory_gb: 4

# ============================================================
# Evaluation Configuration
# ============================================================

evaluation:
  metrics:
    pixel_level:
      - precision
      - recall
      - f1_score
      - iou
      - balanced_accuracy
  
  # Threshold tuning (NEW)
  threshold_search:
    enabled: true
    start: 0.35
    end: 0.65
    step: 0.05
    optimize_for: "f1"  # Options: f1, precision, recall, iou
  
  default_threshold: 0.65
  visualize_samples: 20

# ============================================================
# Logging
# ============================================================

logging:
  level: "INFO"
  log_dir: "logs"
  tensorboard: true
  save_frequency: 5

# ============================================================
# Random Seed
# ============================================================

seed: 42

# ============================================================
# Processed Data Paths
# ============================================================

processed:
  harmonized_cubes: "data/processed/harmonized_204bands"
  spectral_signatures: "data/processed/spectral_signatures"
  metadata: "data/processed/metadata"
  pca_models: "data/processed/pca_models"
